  <text x="1044" y="242" class="mono white" font-size="21" letter-spacing="1.8">WEB SOLUTIONS</text>
  <text x="1044" y="292" class="mono white" font-size="21" letter-spacing="1.8">AUTOMATION SYSTEMS</text>
