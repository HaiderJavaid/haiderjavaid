<svg width="1500" height="500" viewBox="0 0 1500 500" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Haider Javaid banner</title>
  <desc id="desc">Dark navy banner with cyan accents and the name Haider Javaid in large type.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1500" y2="500" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0F2331"/>
      <stop offset="0.55" stop-color="#0A1124"/>
      <stop offset="1" stop-color="#070C1C"/>
    </linearGradient>
    <radialGradient id="glow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(150 110) rotate(18) scale(420 260)">
      <stop stop-color="#21D4C4" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#21D4C4" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="24" height="24" patternUnits="userSpaceOnUse">
      <path d="M24 0H0V24" stroke="#143447" stroke-width="1"/>
    </pattern>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
    <style>
      .sans { font-family: Inter, Arial, Helvetica, sans-serif; }
      .mono { font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace; }
      .line { stroke: #21D4C4; stroke-width: 2; stroke-linecap: square; }
      .muted { fill: #AAB7C7; }
      .bright { fill: #21D4C4; }
      .white { fill: #F5F7FA; }
    </style>
  </defs>

  <rect width="1500" height="500" fill="url(#bg)"/>
  <rect width="1500" height="500" fill="url(#grid)" opacity="0.08"/>
  <rect width="1500" height="500" fill="url(#glow)"/>
  <g filter="url(#soft)" opacity="0.25">
    <circle cx="138" cy="102" r="88" fill="#21D4C4"/>
  </g>

  <path d="M44 104L74 74H622" class="line" opacity="0.95"/>
  <path d="M44 104V160" class="line" opacity="0.95"/>
  <path d="M74 438H886" class="line" opacity="0.5"/>
  <path d="M932 0L910 74L894 278L926 336H1490" stroke="#516079" stroke-width="1.4" opacity="0.55"/>
  <path d="M995 336H1454" stroke="#516079" stroke-width="1.4" opacity="0.55"/>
  <path d="M995 336L983 398H1490" stroke="#516079" stroke-width="1.4" opacity="0.55"/>

  <text x="88" y="56" class="mono bright" font-size="20" letter-spacing="2.4">USER: HAIDER_JAVAID</text>
  <rect x="430" y="40" width="10" height="10" fill="#21D4C4" opacity="0.9"/>

  <text x="86" y="232" class="sans white" font-size="112" font-weight="800">Haider Javaid</text>
  <text x="88" y="296" class="mono bright" font-size="30" letter-spacing="8">DIGITAL SOLUTIONS SPECIALIST</text>
  <path d="M90 320H172" class="line"/>

  <text x="90" y="380" class="mono muted" font-size="25" letter-spacing="1.2">Bridging business, marketing, and web execution to build</text>
  <text x="90" y="418" class="mono muted" font-size="25" letter-spacing="1.2">practical digital systems with clear commercial intent.</text>

  <text x="990" y="106" class="mono bright" font-size="19" letter-spacing="3">SYSTEM STATUS: ONLINE</text>
